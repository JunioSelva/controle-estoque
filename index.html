<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Estoque</title>

  <link rel="stylesheet" href="style.css?v=NOVO_LAYOUT_2000" />
</head>
<body>

  <h1>Controle de Estoque</h1>

  <div class="topo">
    <input
      type="text"
      id="busca"
      placeholder="Buscar item..."
    />

    <select id="filtro-categoria">
      <option value="">Todas categorias</option>
      <option value="Refrigerante">Refrigerante</option>
      <option value="Cerveja">Cerveja</option>
      <option value="Destilado">Destilado</option>
      <option value="Ice/Gin">Ice/Gin</option>
      <option value="Mercearia">Mercearia</option>
      <option value="Carne">Carne</option>
      <option value="Limpeza">Limpeza</option>
    </select>

    <label class="filtro">
      <input
        type="checkbox"
        id="filtro-falta"
      />
      Mostrar só o que falta
    </label>
  </div>

  <div id="lista-produtos">
    <!-- EXEMPLO VISUAL DE CARD -->
    <div class="produto">
      <div class="info-principal">
        <span class="nome">Produto Exemplo</span>
        <span class="categoria">Categoria</span>
      </div>

      <div class="controles-estoque">
        <div class="input-group">
          <label for="data-exemplo">Data</label>
          <input
            type="date"
            id="data-exemplo"
            class="input-data"
          />
        </div>

        <div class="input-group quantidade-box">
          <label for="qtd-exemplo">Quantidade</label>
          <div class="quantidade-controle">
            <button type="button" class="btn-qtd menos">-</button>

            <input
              type="number"
              id="qtd-exemplo"
              class="input-pequeno"
              value="0"
              min="0"
            />

            <button type="button" class="btn-qtd mais">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script src="produtos.js?v=NOVO_LAYOUT_2000"></script>
  <script src="script.js?v=NOVO_LAYOUT_2000"></script>
</body>
</html>
