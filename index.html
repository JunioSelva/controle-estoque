<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Estoque</title>

  <link rel="stylesheet" href="style.css?v=CARDS_2000">
</head>
<body>

  <header class="cabecalho">
    <h1>Controle de Estoque</h1>
    <p class="subtitulo">Consulte e atualize os itens de forma simples</p>
  </header>

  <section class="topo">
    <input
      type="text"
      id="busca"
      placeholder="Buscar item..."
      autocomplete="off"
    >

    <select id="filtro-categoria">
      <option value="">Todas categorias</option>
      <option value="Refrigerante">Refrigerante</option>
      <option value="Cerveja">Cerveja</option>
      <option value="Destilado">Destilado</option>
      <option value="Ice/Gin">Ice/Gin</option>
      <option value="Mercearia">Mercearia</option>
      <option value="Carne">Carne</option>
      <option value="Limpeza">Limpeza</option>
    </select>
  </section>

  <main>
    <div id="lista-produtos">
      Carregando sistema...
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script src="produtos.js?v=CARDS_2000"></script>
  <script src="script.js?v=CARDS_2000"></script>
</body>
</html>
